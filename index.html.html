<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | Biko Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4ef;
      --ink: #1e2d4a;
      --accent: #2e4d7b;
      --border: #c8cdd8;
      --focus: #4a7abf;
      --btn-bg: #1e2d4a;
      --btn-text: #f5f4ef;
      --shadow: 0 4px 24px rgba(30,45,74,0.10);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
    }
    nav {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 20px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.01em;
    }
    .logo span { color: #b5893a; }
    .tagline {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7a8fa8;
    }
    .divider {
      width: 100%;
      max-width: 700px;
      height: 1.5px;
      background: linear-gradient(90deg, var(--accent) 0%, #c8cdd8 100%);
      margin-bottom: 36px;
      border-radius: 2px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 48px 52px 44px;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 0.88rem;
      color: #7a8fa8;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.70rem;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }
    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.96rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(74,122,191,0.13);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 110px; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.15s;
    }
    button:hover { background: var(--accent); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .arrow { font-size: 1.1rem; transition: transform 0.2s; }
    button:hover .arrow { transform: translateX(4px); }
    footer { margin-top: 40px; font-size: 0.75rem; color: #a0aec0; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Biko <span>Foundation</span></div>
    <div class="tagline">Empowering Communities</div>
  </nav>
  <div class="divider"></div>

  <div class="card">
    <h1 class="card-title">Contact Us</h1>
    <p class="card-sub">We'd love to hear from you. Fill in the form below and we'll get back to you shortly.</p>

    <div class="field">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="e.g. Alfred Kamau" autocomplete="name"/>
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="e.g. Alfred@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g. +254 700 000000" autocomplete="tel"/>
    </div>
    <div class="field">
      <label for="subject">Subject Line</label>
      <input type="text" id="subject" placeholder="What's this about?"/>
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Write your message here…"></textarea>
    </div>

    <button onclick="sendMessage()">
      Send Message <span class="arrow">→</span>
    </button>
  </div>

  <footer>© 2026 Biko Foundation. All rights reserved.</footer>

  <script>
    function sendMessage() {
      const fields = ['fullname', 'email', 'phone', 'subject', 'message'];
      const values = fields.map(id => document.getElementById(id).value.trim());
      if (values.some(v => !v)) {
        alert('Please fill in all fields before sending.');
        return;
      }
      window.location.href = 'success.html';
    }
  </script>
</body>
</html>
