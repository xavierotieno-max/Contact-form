<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent | Biko Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4ef;
      --ink: #1e2d4a;
      --accent: #2e4d7b;
      --green: #2e7d54;
      --gold: #b5893a;
      --shadow: 0 4px 24px rgba(30,45,74,0.10);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
    }
    nav {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 20px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent);
    }
    .logo span { color: var(--gold); }
    .tagline {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7a8fa8;
    }
    .divider {
      width: 100%;
      max-width: 700px;
      height: 1.5px;
      background: linear-gradient(90deg, var(--accent) 0%, #c8cdd8 100%);
      margin-bottom: 60px;
      border-radius: 2px;
    }

    /* Success card */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 56px 52px 52px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Animated checkmark circle */
    .check-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e8f5ee;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: popIn 0.5s 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .check-wrap svg {
      width: 40px;
      height: 40px;
    }
    .check-wrap svg path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s 0.7s ease forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.95rem;
      color: #7a8fa8;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--ink);
      color: #f5f4ef;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-back:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-back:active { transform: translateY(0); }

    footer { margin-top: 48px; font-size: 0.75rem; color: #a0aec0; letter-spacing: 0.05em; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Biko <span>Foundation</span></div>
    <div class="tagline">Empowering Communities</div>
  </nav>
  <div class="divider"></div>

  <div class="card">
    <!-- Animated tick -->
    <div class="check-wrap">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 27 L22 35 L38 18" stroke="#2e7d54" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Form Submitted Successfully!</h1>
    <p>Thank you for reaching out to the Biko Foundation.<br>We have received your message and will get back to you within 2–3 business days.</p>

    <a class="btn-back" href="index.html">← Send Another Message</a>
  </div>

  <footer>© 2026 Biko Foundation. All rights reserved.</footer>

</body>
</html>
